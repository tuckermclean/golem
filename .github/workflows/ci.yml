name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      # The architecture's superpower: everything is a golden-file test.
      # A golden diff means the world function changed and every existing
      # seed just broke: that is a MAJOR version bump, not a bugfix.
      - name: determinism tests (worldgen goldens, reducer replay, solver)
        working-directory: games/golem-grid
        run: node --test

  solver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: 10K-seed winnability + difficulty band
        run: node games/golem-grid/tools/solve.js --seeds 10000

  validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python -m pip install pytest
      - name: grounding validator unit tests
        run: python -m pytest tools/test_validate.py -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: single-file build
        run: |
          npm run build -w @golem-engine/golem-grid
          mv games/golem-grid/dist/index.html games/golem-grid/dist/golem-grid.html
      - uses: actions/upload-artifact@v4
        with:
          name: golem-grid-html
          path: games/golem-grid/dist/golem-grid.html

  some-hero-legacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      # Cold runner: legacy deps aren't installed yet, so Playwright's
      # own package (and thus its browser installer) isn't resolvable
      # until after a first `npm ci` in the legacy dir.
      - name: Install legacy deps
        working-directory: games/some-hero/legacy
        run: npm ci
      # Mirrors some-hero's own upstream CI (see
      # games/some-hero/legacy/.github/workflows/ci.yml).
      - name: Install Playwright Chromium
        working-directory: games/some-hero/legacy
        run: npx playwright install --with-deps chromium
      - name: some-hero legacy unit + e2e suites
        run: npm run test:some-hero-legacy
      - name: Upload e2e screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: some-hero-e2e-shots
          path: games/some-hero/legacy/tests/e2e/shots/

  level-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: regenerate topdown-puzzle level manifest; fail on drift
        run: |
          node games/topdown-puzzle/tools/gen-level-manifest.mjs
          git diff --exit-code -- games/topdown-puzzle/levels/manifest.json

  freeze-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      # Permanent DoD job for DELTA.md P0.3 (behavior freeze): golem
      # fixture replay, some-hero @ceremony characterization tests, and
      # topdown-puzzle parse snapshots, in that order, failing fast.
      - name: freeze:verify (golem fixtures + ceremony + tdp snapshots)
        run: npm run freeze:verify
