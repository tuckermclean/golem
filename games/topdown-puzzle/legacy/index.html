<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Kye Physics Grid</title>
    <script type="module" src="/src/main.js"></script>
    <style>
      html, body, #game-container, canvas {
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
        display: block;
        touch-action: none;
      }
      html, body {
        background: #222;
        overflow: hidden;
      }
      body {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh; /* Fill viewport height */
        background: #222;
        overflow: auto;
      }
      canvas {
        max-width: 100vw;
        max-height: 100vh;
        width: auto !important;
        height: auto !important;
        display: block;
        margin: auto;
      }
      @media (min-aspect-ratio: 430/932) {
        canvas {
          width: calc(100vh * 430 / 932);
          height: 100vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
  </body>
</html>
