name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Unit tests
        run: npm test

      - name: e2e — source
        run: npm run test:e2e

      - name: Build single-file HTML
        run: npm run build

      - name: e2e — built file
        run: npm run test:e2e
        env:
          E2E_TARGET: dist/some-hero.html

      - name: Upload artifact (some-hero.html)
        uses: actions/upload-artifact@v4
        with:
          name: some-hero
          path: dist/some-hero.html

      - name: Upload e2e screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-shots
          path: tests/e2e/shots/

      - name: Prepare Pages content
        if: github.ref == 'refs/heads/master'
        run: |
          mkdir -p site
          cp dist/some-hero.html site/index.html

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
